<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H ESSENTIALS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="mobile-brand">H</div>

<header class="main-header">
 <div class="logo">H</div>

 <nav class="nav-desktop">
  <span>SHOP</span>
  <span>COLLECTION</span>
 </nav>

 <div class="header-actions">
  <button class="cart-btn" onclick="toggleCart()">
   <svg viewBox="0 0 24 24">
    <path d="M6 6h15l-1.5 9h-11z"/>
    <circle cx="9" cy="21" r="1.5"/>
    <circle cx="18" cy="21" r="1.5"/>
    <path d="M6 6l-2-4H1"/>
   </svg>
   <span id="cartCount">0</span>
  </button>

  <input
    type="text" 
    id="searchInput" 
    placeholder="Buscar..."
    oninput="searchProducts()"
    class="search-input">
 </div>
</header>

<section class="hero">
 <h1>QUIET LUXURY.<br>ESSENTIALS.</h1>
</section>

<section>
 <div class="products" id="products"></div>
</section>

<!-- CARRITO -->
<div class="cart-drawer" id="cartDrawer">
 <div class="close-btn" onclick="toggleCart()">✕</div>

 <h3 style="padding:20px;">CARRITO</h3>
 <div class="cart-items" id="cartItems"></div>

 <div class="cart-footer">
  <p>Total: $<span id="total">0</span></p>
  <button class="btn" onclick="clearCart()">Limpiar</button>
  <button class="btn" onclick="sendWhatsApp()">WhatsApp</button>
 </div>
</div>

<!-- BUSCADOR -->

<div class="mobile-search" id="mobileSearch">
 <input 
  type="text" 
  placeholder="Buscar..."
  oninput="searchProducts()">
</div>

<!-- PRODUCTO -->
<div class="product-view" id="productView">
 <div class="pv-content">

  <div class="gallery">
 <img id="viewerImg" class="main-img">

 <div class="thumbs" id="thumbs"></div>
</div>

  <div class="pv-info">
   <div class="close-btn" onclick="closeProduct()">✕</div>

   <h2 id="pvName"></h2>
   <p>$<span id="pvPrice"></span></p>

   <div>
    <p>Talla</p>
    <div id="sizeOptions"></div>
   </div>

   <button class="btn" onclick="addCurrentProduct()">Añadir</button>
  </div>

 </div>
</div>

<!-- SOLO MÓVIL - NAVEGACIÓN FLOTANTE -->
<div class="mobile-floating-nav">
 <button class="nav-btn whatsapp-btn" onclick="sendWhatsApp()" title="WhatsApp">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
   <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004a9.87 9.87 0 00-9.746 9.797c0 2.428.738 4.79 2.134 6.81l-.999 3.648 3.732-.978c1.960 1.06 4.158 1.621 6.479 1.621 5.432 0 9.748-4.317 9.748-9.747 0-2.6-.997-5.051-2.782-6.9-1.784-1.849-4.235-2.863-6.783-2.863z"/>
  </svg>
 </button>

 <button class="nav-btn cart-btn-mobile" onclick="toggleCart()" title="Carrito">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
   <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-. 9-2zm13-14H6.54c-.4-1.45-1.84-2.48-3.54-2.48-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2 1.04 0 1.87.84 1.98 1.88H9v2H3.9c-.5-.73-.9-1.5-1.1-2.3H1V2h2v3.66h13.76c.65 1.32 1.68 2.35 3 3.08V5h3v2z"/>
  </svg>
  <span class="cart-badge" id="cartCountMobile">0</span>
 </button>

 <button class="nav-btn search-btn" onclick="toggleSearch()" title="Buscar">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
   <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
  </svg>
 </button>
</div>

<!-- MODAL RECIBO -->
<div class="receipt-modal" id="receiptModal">
 <div class="receipt-container">
  <button class="close-btn" onclick="closeReceipt()">✕</button>
  <div class="receipt" id="receiptContent"></div>
  <div class="receipt-actions">
   <button class="btn" onclick="downloadReceipt()">Descargar</button>
   <button class="btn" onclick="sendReceiptWhatsApp()">Enviar WhatsApp</button>
  </div>
 </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
