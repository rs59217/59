<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H ESSENTIALS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="mobile-brand">H</div>

<header class="main-header">
 <div class="logo">H</div>

 <nav class="nav-desktop">
  <span>SHOP</span>
  <span>COLLECTION</span>
 </nav>

 <div class="header-actions">
  <button class="cart-btn" onclick="toggleCart()">
   <svg viewBox="0 0 24 24">
    <path d="M6 6h15l-1.5 9h-11z"/>
    <circle cx="9" cy="21" r="1.5"/>
    <circle cx="18" cy="21" r="1.5"/>
    <path d="M6 6l-2-4H1"/>
   </svg>
   <span id="cartCount">0</span>
  </button>

  <input
    type="text" 
    id="searchInput" 
    placeholder="Buscar..."
    oninput="searchProducts()"
    class="search-input">
 </div>
</header>

<section class="hero">
 <h1>QUIET LUXURY.<br>ESSENTIALS.</h1>
</section>

<section>
 <div class="products" id="products"></div>
</section>

<!-- CARRITO -->
<div class="cart-drawer" id="cartDrawer">
 <div class="close-btn" onclick="toggleCart()">✕</div>

 <h3 style="padding:20px;">CARRITO</h3>
 <div class="cart-items" id="cartItems"></div>

 <div class="cart-footer">
  <p>Total: $<span id="total">0</span></p>
  <button class="btn" onclick="clearCart()">Limpiar</button>
  <button class="btn" onclick="sendWhatsApp()">WhatsApp</button>
 </div>
</div>

<!-- BUSCADOR -->

<div class="mobile-search" id="mobileSearch">
 <input 
  type="text" 
  placeholder="Buscar..."
  oninput="searchProducts()">
</div>

<!-- PRODUCTO -->
<div class="product-view" id="productView">
 <div class="pv-content">

  <div class="gallery">
 <img id="viewerImg" class="main-img">

 <div class="thumbs" id="thumbs"></div>
</div>

  <div class="pv-info">
   <div class="close-btn" onclick="closeProduct()">✕</div>

   <h2 id="pvName"></h2>
   <p>$<span id="pvPrice"></span></p>

   <div>
    <p>Talla</p>
    <div id="sizeOptions"></div>
   </div>

   <button class="btn" onclick="addCurrentProduct()">Añadir</button>
  </div>

 </div>
</div>

<!-- SOLO MÓVIL - NAVEGACIÓN FLOTANTE -->
<div class="mobile-floating-nav">
 <button class="nav-btn whatsapp-btn" onclick="sendWhatsApp()" title="WhatsApp">
  <svg viewBox="0 0 640 640">
    <path d="M476.9 161.1C435 119.1 379.2 96 319.9 96C197.5 96 97.9 195.6 97.9 318C97.9 357.1 108.1 395.3 127.5 429L96 544L213.7 513.1C246.1 530.8 282.6 540.1 319.8 540.1L319.9 540.1C442.2 540.1 544 440.5 544 318.1C544 258.8 518.8 203.1 476.9 161.1zM319.9 502.7C286.7 502.7 254.2 493.8 225.9 477L219.2 473L149.4 491.3L168 423.2L163.6 416.2C145.1 386.8 135.4 352.9 135.4 318C135.4 216.3 218.2 133.5 320 133.5C369.3 133.5 415.6 152.7 450.4 187.6C485.2 222.5 506.6 268.8 506.5 318.1C506.5 419.9 421.6 502.7 319.9 502.7zM421.1 364.5C415.6 361.7 388.3 348.3 383.2 346.5C378.1 344.6 374.4 343.7 370.7 349.3C367 354.9 356.4 367.3 353.1 371.1C349.9 374.8 346.6 375.3 341.1 372.5C308.5 356.2 287.1 343.4 265.6 306.5C259.9 296.7 271.3 297.4 281.9 276.2C283.7 272.5 282.8 269.3 281.4 266.5C280 263.7 268.9 236.4 264.3 225.3C259.8 214.5 255.2 216 251.8 215.8C248.6 215.6 244.9 215.6 241.2 215.6C237.5 215.6 231.5 217 226.4 222.5C221.3 228.1 207 241.5 207 268.8C207 296.1 226.9 322.5 229.6 326.2C232.4 329.9 268.7 385.9 324.4 410C359.6 425.2 373.4 426.5 391 423.9C401.7 422.3 423.8 410.5 428.4 397.5C433 384.5 433 373.4 431.6 371.1C430.3 368.6 426.6 367.2 421.1 364.5z"/>
  </svg>
 </button>

 <button class="nav-btn cart-btn-mobile" onclick="toggleCart()" title="Carrito">
  <svg viewBox="0 0 24 24">
    <path d="M6 6h15l-1.5 9h-11z"/>
    <circle cx="9" cy="21" r="1.5"/>
    <circle cx="18" cy="21" r="1.5"/>
    <path d="M6 6l-2-4H1"/>
  </svg>
  <span class="cart-badge" id="cartCountMobile">0</span>
 </button>

 <button class="nav-btn search-btn" onclick="toggleSearch()" title="Buscar">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
   <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
  </svg>
 </button>
</div>

<!-- MODAL RECIBO -->
<div class="receipt-modal" id="receiptModal">
 <div class="receipt-container">
  <button class="close-btn" onclick="closeReceipt()">✕</button>
  <div class="receipt" id="receiptContent"></div>
  <div class="receipt-actions">
   <button class="btn" onclick="sendReceiptWhatsApp()">Descargar y Enviar a WhatsApp</button>
  </div>
 </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
